<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Posts - Blog Haven</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #ecf0f1; margin: 0; padding: 20px; color: #2c3e50; }
        header { text-align: center; margin-bottom: 40px; }
        h2 { font-family: 'Playfair Display', serif; color: #34495e; font-size: 2.5em; }
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-links a { padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 25px; transition: all 0.3s ease; }
        .nav-links a:hover { background: #2980b9; transform: rotate(5deg); }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .post-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: transform 0.6s ease; animation: staggerFade 0.5s ease forwards; opacity: 0; transform: translateY(20px); }
        .post-card:nth-child(1) { animation-delay: 0.1s; } .post-card:nth-child(2) { animation-delay: 0.2s; } /* Stagger for more posts */
        @keyframes staggerFade { to { opacity: 1; transform: translateY(0); } }
        .post-card:hover { transform: rotateY(10deg); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        h3 { font-family: 'Playfair Display', serif; color: #2c3e50; margin-bottom: 10px; }
        p { line-height: 1.6; }
        .author { font-style: italic; color: #7f8c8d; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .actions a { padding: 8px 15px; border-radius: 5px; text-decoration: none; transition: all 0.3s ease; }
        .edit { background: #f39c12; color: white; } .edit:hover { background: #e67e22; transform: scale(1.1); }
        .delete { background: #e74c3c; color: white; } .delete:hover { background: #c0392b; transform: scale(1.1); }
        hr { border: none; height: 1px; background: #bdc3c7; margin: 20px 0; }
        @media (max-width: 768px) { .posts-grid { grid-template-columns: 1fr; } .nav-links { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>
    <header>
        <h2>All Posts</h2>
        <div class="nav-links">
            <a href="/create/">Create Post</a>
            <a href="/logout/">Logout</a>
            <a href="/view_all/">View all posts</a>
        </div>
        <hr>
    </header>
    <div class="posts-grid">
        {% for post in posts %}
            <div class="post-card">
                <h3>{{ post.title }}</h3>
                <p>{{ post.content }}</p>
                <p class="author">Author: {{ post.author }}</p>
                {% if request.user == post.author or request.user.is_superuser %}
                    <div class="actions">
                        <a href="/update/{{ post.id }}/">Edit</a>
                        <a href="/delete/{{ post.id }}/">Delete</a>
                    </div>
                {% endif %}
            </div>
        {% endfor %}
    </div>
    <script>
        // Flip effect enhancer (using CSS perspective if needed)
        document.querySelectorAll('.post-card').forEach(card => {
            card.addEventListener('mouseenter', () => card.style.perspective = '1000px');
        });
    </script>
</body>
</html>
