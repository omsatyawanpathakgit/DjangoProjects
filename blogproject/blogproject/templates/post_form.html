<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if form.instance.pk %}Edit{% else %}Create{% endif %} Post - Blog Haven</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; color: #2c3e50; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h2 { font-family: 'Playfair Display', serif; text-align: center; color: #27ae60; margin-bottom: 30px; font-size: 2em; }
        /* Dynamic h2 color/text for better UX */
        .edit-mode h2 { color: #e67e22; } /* Orange for edit */
        .create-mode h2 { color: #27ae60; } /* Green for create */
        form { display: grid; gap: 20px; }
        label { font-weight: bold; color: #34495e; transition: color 0.3s ease; }
        input[type="text"], textarea { padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 16px; transition: border-color 0.3s ease, transform 0.2s ease; width: 100%; box-sizing: border-box; }
        input[type="text"]:focus, textarea:focus { border-color: #27ae60; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(39, 174, 96, 0.2); }
        button { background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: all 0.3s ease; animation: bounce 0.6s ease; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(39, 174, 96, 0.3); }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #95a5a6; color: white; text-decoration: none; border-radius: 8px; transition: background 0.3s ease; text-align: center; }
        a:hover { background: #7f8c8d; }
        @media (max-width: 480px) { .container { padding: 20px; margin-top: 20px; } }
    </style>
</head>
<body>
    <div class="container {% if form.instance.pk %}edit-mode{% else %}create-mode{% endif %}">
        <h2>{% if form.instance.pk %}Edit{% else %}Create{% endif %} Post</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">{% if form.instance.pk %}Update{% else %}Save{% endif %}</button>
        </form>
        <a href="/">Back</a>
    </div>
    <script>
        // Typewriter effect for title input (add the missing @keyframes to <style> if desired)
        const titleInput = document.querySelector('input[name="title"]');
        if (titleInput) {
            titleInput.addEventListener('focus', function() {
                this.style.animation = 'typewriter 2s steps(20) infinite';
            });
        }
    </script>
    <!-- Optional: Add typewriter keyframes to <style> block above -->
    <!-- @keyframes typewriter { from { width: 0; } to { width: 100%; } } -->
</body>
</html>
