<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Blog Haven</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
    body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #2c3e50; }
    .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; animation: slideInRight 0.8s ease-out; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    h2 { font-family: 'Playfair Display', serif; text-align: center; color: #e74c3c; margin-bottom: 30px; font-size: 2em; }
    form { display: flex; flex-direction: column; gap: 15px; }
    input { padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; font-size: 16px; transition: all 0.3s ease; }
    input:focus { border-color: #e74c3c; box-shadow: 0 0 10px rgba(231, 76, 60, 0.3); }
    button { background: #e74c3c; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; }
    button:hover { background: #c0392b; transform: translateY(-2px); }
    a { text-align: center; display: block; margin-top: 15px; color: #e74c3c; text-decoration: none; transition: color 0.3s ease; }
    a:hover { color: #a93226; }
    @media (max-width: 480px) { .container { padding: 20px; } }
</style>
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
        <a href="/login/">Login</a>
    </div>
    <script>
        // Form field highlight on focus
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => input.parentElement.style.transform = 'scale(1.02)');
            input.addEventListener('blur', () => input.parentElement.style.transform = 'scale(1)');
        });
    </script>
</body>
</html>
